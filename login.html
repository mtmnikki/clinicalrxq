<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member Login • ClinicalRxQ</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; padding: 24px; background:#f6f7f9; }
    .card { max-width: 420px; margin: 10vh auto; background:#fff; border-radius:12px; padding:24px; box-shadow:0 6px 20px rgba(0,0,0,.08); }
    label { display:block; margin:12px 0 6px; font-weight:600; }
    input { width:100%; padding:10px 12px; border:1px solid #ccd1d5; border-radius:8px; }
    button { width:100%; margin-top:16px; padding:12px; border:0; border-radius:10px; font-weight:700; cursor:pointer; background:#2b6cb0; color:white; }
    .msg { min-height: 20px; margin-top: 10px; color:#b00020; font-weight:600; }
    .sub { color:#667085; font-size:12px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 8px;">Member Login</h1>
    <div class="sub">Use the email on file and the temporary password.</div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button type="submit">Log in</button>
      <div id="msg" class="msg"></div>
    </form>
    <div class="sub">Having trouble? Try your temp password: <strong>Pharmacy1</strong>.</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.style.color = '#667085';
      msg.textContent = 'Signing in…';
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        let data = {};
        try { data = await r.json(); } catch {}
        if (!r.ok) {
          msg.style.color = '#b00020';
          msg.textContent = (data && data.error) ? data.error : 'Login failed';
          return;
        }
        // Success → go to member area
        window.location.href = '/member.html';
      } catch (err) {
        msg.style.color = '#b00020';
        msg.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
