<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member Area • ClinicalRxQ</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin:0; background:#f6f7f9; }
    .nav { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.05);}
    .btn { padding:10px 14px; border-radius:8px; border:1px solid #ccd1d5; background:#fff; cursor:pointer; }
    .wrap { max-width:1000px; margin:20px auto; padding:0 20px; }
    .card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,.08); }
  </style>
</head>
<body>
  <div class="nav">
    <div><strong>ClinicalRxQ</strong> — Member Hub</div>
    <div>
      <span id="who" style="margin-right:12px; color:#667085;"></span>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div class="wrap">
    <div class="card">
      <h2>Welcome</h2>
      <p>You’re signed in. Put member-only content/links here.</p>
      <ul>
        <li><a href="/resources.html">Resources</a> (placeholder)</li>
        <li><a href="/training.html">Training</a> (placeholder)</li>
      </ul>
    </div>
  </div>

  <script>
    async function checkSession() {
      const r = await fetch('/api/me', { credentials: 'include' });
      if (!r.ok) {
        // Not logged in → back to login
        location.href = '/login.html';
        return;
      }
      const me = await r.json();
      document.getElementById('who').textContent = me.email || '';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { credentials: 'include' });
      location.href = '/login.html';
    });

    checkSession();
  </script>
</body>
</html>
